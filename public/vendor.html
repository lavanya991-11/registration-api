<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Registration</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="vendor">
    <div class="wrap">
        <div class="card">
            <div class="banner">
                <h1>Vendor Registration</h1>
                <p>Complete the form below to register as a vendor. Fields marked * are required.</p>
            </div>
            <div class="body">
                <form id="form">
                    <div id="headerSection">
                        <section class="block">
                            <h2>Company Information</h2>
                            <div class="grid">
                                <div class="field full"><label class="req">Trade Name</label><input name="tradeName" required /></div>
                                <div class="field"><label class="req">Email</label><input name="partnerEmail" type="email" required /></div>
                                <div class="field"><label>Phone No.</label><input name="phoneNo" /></div>
                                <div class="field full"><label>Website</label><input name="website" /></div>
                            </div>
                        </section>

                        <section class="block">
                            <h2>Registration Details</h2>
                            <div class="grid">
                                <div class="field"><label>Trade License Number</label><input name="tradeLicenseNumber" /></div>
                                <div class="field"><label>Trade License Expiry Date</label><input name="tradeLicenseExpiryDate" type="date" /></div>
                                <div class="field"><label>Company Registration Number</label><input name="companyRegNumber" /></div>
                                <div class="field"><label>Type of Entity</label><input name="entityType" /></div>
                                <div class="field"><label>Country of Incorporation</label><input name="countryOfIncorporation" /></div>
                                <div class="field"><label>Place of Registration</label><input name="placeOfRegistration" /></div>
                                <div class="field full"><label>VAT Registration No.</label><input name="vatRegistrationNo" /></div>
                            </div>
                        </section>

                        <section class="block">
                            <h2>Address</h2>
                            <div class="grid">
                                <div class="field full"><label>Address</label><input name="address" /></div>
                                <div class="field full"><label>Address 2</label><input name="address2" /></div>
                                <div class="field"><label>City</label><input name="city" /></div>
                                <div class="field"><label>Post Code</label><input name="postCode" /></div>
                                <div class="field"><label class="req">Country/Region Code</label><input name="countryRegionCode" required /></div>
                            </div>
                        </section>
                    </div>

                    <section class="block">
                        <h2>Contacts</h2>
                        <div id="contacts"></div>
                        <button type="button" class="add" data-add="contact">+ Add contact</button>
                    </section>

                    <section class="block">
                        <h2>Bank Accounts</h2>
                        <div id="banks"></div>
                        <button type="button" class="add" data-add="bank">+ Add bank account</button>
                    </section>

                    <div class="actions">
                        <button type="submit">Submit Registration</button>
                    </div>
                </form>
                <div id="msg"></div>
            </div>
        </div>
    </div>

    <template id="contactTemplate">
        <div class="line-row">
            <button type="button" class="remove" title="Remove">&times;</button>
            <div class="grid">
                <div class="field"><label>Full Name</label><input data-field="fullName" /></div>
                <div class="field"><label>Designation</label><input data-field="designation" /></div>
                <div class="field"><label>Mobile Number</label><input data-field="mobileNumber" /></div>
                <div class="field"><label>Email</label><input data-field="emailAddress" type="email" /></div>
            </div>
        </div>
    </template>
    <template id="bankTemplate">
        <div class="line-row">
            <button type="button" class="remove" title="Remove">&times;</button>
            <div class="grid">
                <div class="field"><label>Bank Code</label><input data-field="bankCode" /></div>
                <div class="field"><label>Bank Name</label><input data-field="name" /></div>
                <div class="field"><label>Branch No.</label><input data-field="bankBranchNo" /></div>
                <div class="field"><label>Account No.</label><input data-field="bankAccountNo" /></div>
                <div class="field"><label>IBAN</label><input data-field="iban" /></div>
                <div class="field"><label>SWIFT Code</label><input data-field="swiftCode" /></div>
                <div class="field"><label>Currency</label><input data-field="currencyCode" /></div>
                <div class="field inline"><label><input type="checkbox" data-field="isPrimary" /> Primary account</label></div>
            </div>
        </div>
    </template>

    <script>window.SUBMIT_URL = '/api/vendor';</script>
    <script src="form.js"></script>
</body>
</html>
